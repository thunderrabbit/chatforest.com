<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ block "title" . }}{{ .Title }} — ChatForest{{ end }}</title>
  <meta name="description" content="{{ .Description | default .Site.Params.description }}">
  <meta property="og:title" content="{{ .Title }} — ChatForest">
  <meta property="og:description" content="{{ .Params.og_description | default .Description | default .Site.Params.description }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="ChatForest">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css">
  {{ if .IsHome }}<link rel="alternate" type="application/rss+xml" title="ChatForest" href="/feed.xml">{{ end }}
</head>
<body>

{{ partial "header.html" . }}

<main>
  <div class="container">
    {{ block "main" . }}{{ end }}
  </div>
</main>

{{ partial "footer.html" . }}

</body>
</html>
